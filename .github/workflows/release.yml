name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version without the v prefix (for example, 1.2.3 or 1.2.3-beta.1)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Validate version
        id: release
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          $version = $env:RELEASE_VERSION.Trim()
          $match = [regex]::Match(
            $version,
            '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$'
          )

          if (-not $match.Success) {
            throw "Version '$version' is not valid SemVer. Use a value such as 1.2.3 or 1.2.3-beta.1 without the v prefix."
          }

          $numericParts = @($match.Groups[1].Value, $match.Groups[2].Value, $match.Groups[3].Value)
          foreach ($part in $numericParts) {
            $parsedPart = 0
            if (-not [int]::TryParse($part, [ref]$parsedPart) -or $parsedPart -gt 65534) {
              throw "Each numeric version component must be between 0 and 65534 so it can be included in the executable."
            }
          }

          $fileVersion = "$($numericParts[0]).$($numericParts[1]).$($numericParts[2]).0"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "file_version=$fileVersion" >> $env:GITHUB_OUTPUT
          "asset_name=PingTester-v$version-win-x64.exe" >> $env:GITHUB_OUTPUT

      - name: Build versioned executable
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          FILE_VERSION: ${{ steps.release.outputs.file_version }}
          ASSET_NAME: ${{ steps.release.outputs.asset_name }}
        run: |
          dotnet publish src/PingTester.csproj `
            --configuration Release `
            --runtime win-x64 `
            --output dist `
            /p:Version="$env:RELEASE_VERSION" `
            /p:AssemblyVersion="$env:FILE_VERSION" `
            /p:FileVersion="$env:FILE_VERSION" `
            /p:InformationalVersion="$env:RELEASE_VERSION" `
            /p:IncludeSourceRevisionInInformationalVersion=false

          if ($LASTEXITCODE -ne 0) {
            throw "dotnet publish exited with code $LASTEXITCODE."
          }

          $executable = Get-Item dist/PingTester.exe
          $versionInfo = $executable.VersionInfo
          if ($versionInfo.FileVersion -ne $env:FILE_VERSION) {
            throw "The executable contains FileVersion '$($versionInfo.FileVersion)' instead of '$env:FILE_VERSION'."
          }
          if ($versionInfo.ProductVersion -ne $env:RELEASE_VERSION) {
            throw "The executable contains ProductVersion '$($versionInfo.ProductVersion)' instead of '$env:RELEASE_VERSION'."
          }

          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item $executable.FullName "release/$env:ASSET_NAME"

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          ASSET_NAME: ${{ steps.release.outputs.asset_name }}
        run: |
          $arguments = @(
            'release', 'create', $env:RELEASE_TAG,
            "release/$env:ASSET_NAME",
            '--repo', $env:GITHUB_REPOSITORY,
            '--target', $env:GITHUB_SHA,
            '--title', "Ping Tester v$env:RELEASE_VERSION",
            '--notes-file', 'RELEASE-NOTES.md'
          )

          if ($env:RELEASE_VERSION.Contains('-')) {
            $arguments += '--prerelease'
          }

          gh @arguments
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release creation failed. Review the preceding error and confirm that the release does not already exist."
          }
